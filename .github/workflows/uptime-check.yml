name: Uptime Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-uptime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore previous state
        id: cache
        uses: actions/cache@v4
        with:
          path: .monitor-state
          key: monitor-state-${{ github.run_id }}
          restore-keys: monitor-state-

      - name: Check sites and alert
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p .monitor-state
          STATE_FILE=".monitor-state/status.txt"
          touch "$STATE_FILE"

          URLS=(
            "API|https://api.blog.thienduong.info/api/health"
            "Grafana|https://grafana.thienduong.info/api/health"
          )

          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')

          for ENTRY in "${URLS[@]}"; do
            NAME="${ENTRY%%|*}"
            URL="${ENTRY##*|}"

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              CURRENT_STATUS="UP"
            else
              CURRENT_STATUS="DOWN"
            fi

            PREV_STATUS=$(grep "^${NAME}=" "$STATE_FILE" 2>/dev/null | cut -d= -f2 || echo "UNKNOWN")

            echo "$NAME: HTTP=$HTTP_CODE Status=$CURRENT_STATUS Previous=$PREV_STATUS"

            if [ "$CURRENT_STATUS" != "$PREV_STATUS" ]; then

              if [ "$CURRENT_STATUS" = "DOWN" ]; then
                TEXT=$(printf "đź”´ <b>SITE DOWN</b>\n\n<b>Service:</b> %s\n<b>URL:</b> <code>%s</code>\n<b>HTTP:</b> %s\n<b>Time:</b> %s\n\nâš ď¸Ź VPS hoac service co the da chet!" "$NAME" "$URL" "$HTTP_CODE" "$TIMESTAMP")
                echo "đź”´ SENDING DOWN ALERT: $NAME"
              else
                DOWN_SINCE=$(grep "^${NAME}_DOWN_AT=" "$STATE_FILE" 2>/dev/null | cut -d= -f2 || echo "unknown")
                TEXT=$(printf "âś… <b>SITE RECOVERED</b>\n\n<b>Service:</b> %s\n<b>URL:</b> <code>%s</code>\n<b>HTTP:</b> %s\n<b>Time:</b> %s\n<b>Was down since:</b> %s" "$NAME" "$URL" "$HTTP_CODE" "$TIMESTAMP" "$DOWN_SINCE")
                echo "âś… SENDING RECOVERY ALERT: $NAME"
              fi

              curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                -d "chat_id=${CHAT_ID}" \
                -d "text=${TEXT}" \
                -d "parse_mode=HTML" > /dev/null
            fi

            grep -v "^${NAME}=" "$STATE_FILE" > "${STATE_FILE}.tmp" 2>/dev/null || true
            echo "${NAME}=${CURRENT_STATUS}" >> "${STATE_FILE}.tmp"

            grep -v "^${NAME}_DOWN_AT=" "${STATE_FILE}.tmp" > "${STATE_FILE}.tmp2" 2>/dev/null || true
            if [ "$CURRENT_STATUS" = "DOWN" ] && [ "$PREV_STATUS" != "DOWN" ]; then
              echo "${NAME}_DOWN_AT=${TIMESTAMP}" >> "${STATE_FILE}.tmp2"
            elif [ "$CURRENT_STATUS" = "DOWN" ]; then
              grep "^${NAME}_DOWN_AT=" "$STATE_FILE" >> "${STATE_FILE}.tmp2" 2>/dev/null || true
            fi
            mv "${STATE_FILE}.tmp2" "$STATE_FILE"
          done

          echo ""
          echo "=== Current State ==="
          cat "$STATE_FILE"

      - name: Send reminder if still DOWN
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATE_FILE=".monitor-state/status.txt"
          MINUTE=$(date -u +'%M')

          if [ "$MINUTE" = "00" ] || [ "$MINUTE" = "30" ]; then
            DOWN_LIST=""
            while IFS='=' read -r KEY VALUE; do
              case "$KEY" in
                *_DOWN_AT) ;;
                *) [ "$VALUE" = "DOWN" ] && DOWN_LIST="${DOWN_LIST} ${KEY}" ;;
              esac
            done < "$STATE_FILE"

            if [ -n "$DOWN_LIST" ]; then
              TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')
              TEXT=$(printf "âš ď¸Ź <b>VAN DANG DOWN</b>\n\nServices:%s\n<b>Time:</b> %s" "$DOWN_LIST" "$TIMESTAMP")

              curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                -d "chat_id=${CHAT_ID}" \
                -d "text=${TEXT}" \
                -d "parse_mode=HTML" > /dev/null

              echo "Reminder sent"
            fi
          fi
